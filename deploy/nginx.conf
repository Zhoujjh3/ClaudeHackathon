# FieldFit nginx config
# Place in /etc/nginx/sites-available/fieldfit
# Then: sudo ln -s /etc/nginx/sites-available/fieldfit /etc/nginx/sites-enabled/
# And:  sudo nginx -t && sudo systemctl reload nginx
#
# With nginx, set VITE_API_URL="" before building the frontend
# so API calls use relative paths (/api/...) through this proxy.

server {
    listen 80;
    server_name _;  # Replace with your domain or server IP

    # Proxy API calls to FastAPI backend
    location /api/ {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Serve built React frontend as static files
    location / {
        root /path/to/fieldfit/frontend/dist;  # <-- update this path
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
}
